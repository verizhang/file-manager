syntax = "proto3";

package file.v1;

option go_package = "github.com/verizhang/files-manager/gen/files/v1;filev1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service FileService {

  // =====================================================
  // SIMPLE UPLOAD
  // =====================================================

  rpc CreateUploadUrl(CreateUploadUrlRequest)
      returns (CreateUploadUrlResponse) {
    option (google.api.http) = {
      post: "/v1/files/upload-url"
      body: "*"
    };
  }

  // =====================================================
  // CompleteUpload
  // =====================================================
  rpc CompleteUpload(CompleteUploadRequest)
    returns (CompleteUploadResponse) {
  option (google.api.http) = {
    post: "/v1/files/{file_id}/complete"
    body: "*"
  };
}

  // =====================================================
  // MULTIPART UPLOAD
  // =====================================================

  rpc CreateMultipartUpload(CreateMultipartUploadRequest)
      returns (CreateMultipartUploadResponse) {
    option (google.api.http) = {
      post: "/v1/files/multipart"
      body: "*"
    };
  }

  rpc CreateMultipartUploadUrl(CreateMultipartUploadUrlRequest)
      returns (CreateMultipartUploadUrlResponse) {
    option (google.api.http) = {
      post: "/v1/files/multipart/url"
      body: "*"
    };
  }

  rpc CompleteMultipartUpload(CompleteMultipartUploadRequest)
      returns (CompleteMultipartUploadResponse) {
    option (google.api.http) = {
      post: "/v1/files/multipart/complete"
      body: "*"
    };
  }

  rpc AbortMultipartUpload(AbortMultipartUploadRequest)
      returns (AbortMultipartUploadResponse) {
    option (google.api.http) = {
      post: "/v1/files/multipart/abort"
      body: "*"
    };
  }

  // =====================================================
  // FILE ACCESS
  // =====================================================

  rpc GetFile(GetFileRequest)
      returns (GetFileResponse) {
    option (google.api.http) = {
      get: "/v1/files/{file_id}"
    };
  }

  rpc CreateDownloadUrl(CreateDownloadUrlRequest)
      returns (CreateDownloadUrlResponse) {
    option (google.api.http) = {
      post: "/v1/files/{file_id}/download-url"
      body: "*"
    };
  }

  

  // =====================================================
  // DELETE
  // =====================================================

  rpc DeleteFile(DeleteFileRequest)
      returns (DeleteFileResponse) {
    option (google.api.http) = {
      delete: "/v1/files/{file_id}"
    };
  }
}

enum FileStatus {
  FILE_STATUS_UNSPECIFIED = 0;
  FILE_STATUS_PENDING = 1;
  FILE_STATUS_UPLOADING = 2;
  FILE_STATUS_COMPLETED = 3;
  FILE_STATUS_ABORTED = 4;
}

message FileObject {
  string id = 1;
  string bucket = 2;
  string object_key = 3;
  string file_name = 4;
  string content_type = 5;
  int64 size = 6;
  string etag = 7;
  FileStatus status = 8;
  VirusScanStatus virus_scan_status = 9;
  google.protobuf.Timestamp created_at = 10;
}

//
// SIMPLE UPLOAD
//

message CreateUploadUrlRequest {
  string file_name = 1;
  string content_type = 2;
  int64 size = 3;
}

message CreateUploadUrlResponse {
  string file_id = 1;
  string upload_url = 2;
  string object_key = 3;

  map<string, string> headers = 4;
}

message CompleteUploadRequest {
  string file_id = 1;
}

message CompleteUploadResponse {
  FileObject file = 1;
}

enum VirusScanStatus {
  VIRUS_SCAN_STATUS_UNSPECIFIED = 0;
  VIRUS_SCAN_STATUS_PENDING = 1;
  VIRUS_SCAN_STATUS_SCANNING = 2;
  VIRUS_SCAN_STATUS_CLEAN = 3;
  VIRUS_SCAN_STATUS_INFECTED = 4;
  VIRUS_SCAN_STATUS_FAILED = 5;
}

//
// MULTIPART
//

message CreateMultipartUploadRequest {
  string file_name = 1;
  string content_type = 2;
  int64 size = 3;
}

message CreateMultipartUploadResponse {
  string file_id = 1;
  string upload_id = 2;
  string object_key = 3;
  int64 part_size = 4;
  int32 total_parts = 5;
}

message CreateMultipartUploadUrlRequest {
  string file_id = 1;
  string upload_id = 2;
  string object_key = 3;
  int32 part_number = 4;
}

message CreateMultipartUploadUrlResponse {
  string upload_url = 1;

  map<string, string> headers = 2;
}

message MultipartPart {
  int32 part_number = 1;
  string etag = 2;
}

message CompleteMultipartUploadRequest {
  string upload_id = 1;
  string object_key = 2;

  repeated MultipartPart parts = 3;
}

message CompleteMultipartUploadResponse {
  FileObject file = 1;
}

message AbortMultipartUploadRequest {
  string upload_id = 1;
  string object_key = 2;
}

message AbortMultipartUploadResponse {}

//
// FILE ACCESS
//

message GetFileRequest {
  string file_id = 1;
}

message GetFileResponse {
  FileObject file = 1;
}

message CreateDownloadUrlRequest {
  string file_id = 1;
}

message CreateDownloadUrlResponse {
  string download_url = 1;
}



//
// DELETE
//

message DeleteFileRequest {
  string file_id = 1;
}

message DeleteFileResponse {
  string message = 1;
}